<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四葉のクローバーを探せ！</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #e6f4ea;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            color: #137333;
            font-size: 20px;
            margin-bottom: 5px;
            text-align: center;
        }

        p {
            color: #5f6368;
            margin: 0 0 15px 0;
            font-size: 14px;
        }

        /* ゲームボード（送っていただいた画像を背景に設定） */
        #game-board {
            position: relative;
            width: 90vw;
            max-width: 800px;
            height: 70vh;
            background-image: url('ok.png'); /* ここで画像を読み込んでいます */
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(32,33,36,0.08), 0 1px 3px rgba(32,33,36,0.04);
            border: 1px solid #dadce0;
            overflow: hidden;
        }

        /* クローバーのサイズ（28px） */
        .clover {
            position: absolute;
            font-size: 28px;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .clover:hover {
            transform: scale(1.3) !important;
            z-index: 10;
        }

        /* クリアポップアップ */
        #popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 100;
            border: 1px solid #dadce0;
        }

        #popup h2 {
            color: #1a73e8;
            margin-top: 0;
        }

        #popup button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>🍀 四葉のクローバーを探せ！ 🍀</h1>
    <p>可愛い背景の中に「🍀」が1つだけ隠れているよ。見つけてクリックしてね！</p>

    <div id="game-board"></div>

    <div id="popup">
        <h2>🎉 クリア！ 🎉</h2>
        <p>おめでとうございます！四葉のクローバーが見つかりました！</p>
        <button onclick="startGame()">もう一度遊ぶ</button>
    </div>

    <script>
        const board = document.getElementById('game-board');
        const popup = document.getElementById('popup');

        // クローバーの配置間隔（隙間なく敷き詰める設定）
        const GRID_SIZE = 26; 

        function startGame() {
            board.innerHTML = '';
            popup.style.display = 'none';

            const boardWidth = board.clientWidth;
            const boardHeight = board.clientHeight;

            // 敷き詰める列数と行数を計算
            const cols = Math.floor(boardWidth / GRID_SIZE);
            const rows = Math.floor(boardHeight / GRID_SIZE);
            const totalClovers = cols * rows;

            // 四葉の位置をランダムに決定
            const targetIndex = Math.floor(Math.random() * totalClovers);

            // 余白調整用のオフセット
            const offsetX = (boardWidth - (cols * GRID_SIZE)) / 2;
            const offsetY = (boardHeight - (rows * GRID_SIZE)) / 2;

            for (let i = 0; i < totalClovers; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);

                const clover = document.createElement('div');
                clover.className = 'clover';

                // 自然に見せるためのちょっとしたズレ
                const jitterX = (Math.random() - 0.5) * 4;
                const jitterY = (Math.random() - 0.5) * 4;

                clover.style.left = `${col * GRID_SIZE + offsetX + jitterX}px`;
                clover.style.top = `${row * GRID_SIZE + offsetY + jitterY}px`;

                // ランダムに回転
                const rotate = Math.random() * 360;
                clover.style.transform = `rotate(${rotate}deg)`;

                if (i === targetIndex) {
                    clover.textContent = '🍀';
                    clover.onclick = function(e) {
                        e.stopPropagation();
                        popup.style.display = 'block';
                    };
                } else {
                    clover.textContent = '☘️';
                }

                board.appendChild(clover);
            }
        }

        window.onload = startGame;
        let resizeTimeout;
        window.onresize = function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(startGame, 200);
        };
    </script>

</body>
</html>
